name: Publish package to NPM
on:
  push:
    branches:
      - master # Triggers the workflow whenever changes are pushed to master

jobs:
  publish:
    # Ensures this only runs if the PR was actually merged, not just closed
    # if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # 1. Downloads a copy of your code repository onto the runner
      - name: Checkout Code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0 # Fetches history so git push can succeed
          token: ${{ secrets.ADMIN_PAT }}

      # 2. Installs Node.js on virtual machine
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.18.0"
          registry-url: "https://registry.npmjs.org/"
          cache: 'npm'

      #3. Configure git profile so the runner can commit the version increment
      - name: Configure git bot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@84145992+ektadubey3@users.noreply.github.com"
        
      #4. Installs project dependencies
      - name: Install Dependencies
        run: npm ci || npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_KEY }}
        
      #5 Automatically updates package.json (e.g., 1.0.0 -> 1.0.1)
      - name: Auto Increment Version
        run: |
          npm config set force true
          npm version patch -m "chore(release): bump version to %s [skip ci]"

      #6 Pushes the version update and tag back into the master branch
      - name: Push Version Update to GitHub
        run: |
          git fetch origin master
          git rebase origin/master
          git push origin master --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.ADMIN_PAT }}
      
      #7 Finalizes by pushing your package to npm registry
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_KEY }}
